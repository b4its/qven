server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    
    # Direktori root harus mengarah ke folder public Laravel
    root /var/www/html/public;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location / {
        # Mencoba menyajikan file statis, jika tidak ada lempar ke index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Menangani file PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # 'php-fpm' adalah nama service yang kita buat di docker-compose.yml
        fastcgi_pass php-fpm:9000; 
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Melarang akses ke file tersembunyi seperti .env
    location ~ /\.(?!well-known).* {
        deny all;
    }
}